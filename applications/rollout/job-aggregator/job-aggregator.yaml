---
# Source: job-aggregator/templates/candidate-api.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: job-aggregator-candidate-api
  labels:
    app.kubernetes.io/name: job-aggregator
    helm.sh/chart: job-aggregator-0.1.0
    app.kubernetes.io/instance: job-aggregator
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: candidate-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: job-aggregator
      app.kubernetes.io/instance: job-aggregator
      app.kubernetes.io/component: candidate-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: job-aggregator
        app.kubernetes.io/instance: job-aggregator
        app.kubernetes.io/component: candidate-api
    spec:
      serviceAccountName: default
      containers:
        - name: candidate-api
          image: "ghcr.io/lynh7/job-aggregator-candidate-api:0.1.0"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8100
              name: http
          env:
            
            - name: QUEUE_BACKEND
              value: "database"
            
            
          envFrom:
            - secretRef:
                name: job-aggregator-env
          volumeMounts:
            - name: shared-data
              mountPath: /app/data
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8100
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8100
      volumes:
        - name: shared-data
          persistentVolumeClaim:
            claimName: job-aggregator-shared-data
