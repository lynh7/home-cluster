---
# Source: job-aggregator/templates/crawler-api.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: job-aggregator-crawler-api
  labels:
    app.kubernetes.io/name: job-aggregator
    helm.sh/chart: job-aggregator-0.1.0
    app.kubernetes.io/instance: job-aggregator
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: crawler-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: job-aggregator
      app.kubernetes.io/instance: job-aggregator
      app.kubernetes.io/component: crawler-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: job-aggregator
        app.kubernetes.io/instance: job-aggregator
        app.kubernetes.io/component: crawler-api
    spec:
      serviceAccountName: default
      containers:
        - name: crawler-api
          image: "ghcr.io/lynh7/job-aggregator-crawler-api-browser:0.1.0"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8200
              name: http
          env:
            
            - name: CRAWL_BACKEND
              value: "crawl4ai"
            - name: CORE_API_BASE_URL
              value: "http://job-aggregator-job-api:8000"
            - name: CORE_API_INGEST_PATH
              value: "/api/v1/ingest/raw-jobs"
            - name: CRAWLER_ENABLED_PROVIDERS
              value: "topcv,itviec"
            
            
          envFrom:
            - secretRef:
                name: job-aggregator-env
          resources:
            limits:
              cpu: "2"
              memory: 2Gi
            requests:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8200
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8200
