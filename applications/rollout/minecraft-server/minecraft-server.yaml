# Source: minecraft-server/charts/mc-router/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minecraft-server-mc-router
  namespace: minecraft
  labels:
    helm.sh/chart: mc-router-1.5.0
    app.kubernetes.io/name: mc-router
    app.kubernetes.io/instance: minecraft-server
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mc-router
      app.kubernetes.io/instance: minecraft-server
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        helm.sh/chart: mc-router-1.5.0
        app.kubernetes.io/name: mc-router
        app.kubernetes.io/instance: minecraft-server
        app.kubernetes.io/version: "1.0.0"
        app.kubernetes.io/managed-by: Helm
    spec:
      serviceAccountName: minecraft-server-mc-router
      securityContext:
        {}
      containers:
        - name: mc-router
          securityContext:
            {}
          image: "itzg/mc-router:latest"
          imagePullPolicy: Always
          env:
            - name: IN_KUBE_CLUSTER
              value: "true"
            - name: API_BINDING
              value: ":8080"
            - name: PORT
              value: "25565"
            - name: AUTO_SCALE_UP
              value: "false"
            - name: AUTO_SCALE_DOWN
              value: "false"
            - name: CONNECTION_RATE_LIMIT
              value: "1"
            - name: DEBUG
              value: "false"
            - name: METRICS_BACKEND
              value: "discard"
            - name: SIMPLIFY_SRV
              value: "false"
            - name: USE_PROXY_PROTOCOL
              value: "false"
            - name: VERSION
              value: "false"
          ports:
            - name: api
              containerPort: 8080
              protocol: TCP
            - name: minecraft
              containerPort: 25565
              protocol: TCP
          livenessProbe:
            initialDelaySeconds: 30
            failureThreshold: 20
            httpGet:
              path: /routes
              httpHeaders:
                - name: Accept
                  value: application/json
              port: 8080
          readinessProbe:
            initialDelaySeconds: 30
            failureThreshold: 20
            httpGet:
              path: /routes
              httpHeaders:
                - name: Accept
                  value: application/json
              port: 8080
          startupProbe:
            failureThreshold: 30
            httpGet:
              path: /routes
              httpHeaders:
                - name: Accept
                  value: application/json
              port: 8080
          resources:
            {}

---
# Source: minecraft-server/charts/minecraft/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minecraft-server
  namespace: minecraft
  labels:
    app: minecraft-server
    chart: minecraft-5.1.3
    release: "minecraft-server"
    heritage: "Helm"
    app.kubernetes.io/name: "minecraft"
    app.kubernetes.io/instance: minecraft-server
    app.kubernetes.io/version: 5.1.3
spec:
  replicas: 1
  revisionHistoryLimit: 10
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: minecraft-server
  template:
    metadata:
      labels:
        app: minecraft-server
        app.kubernetes.io/name: "minecraft"
        app.kubernetes.io/instance: minecraft-server
        app.kubernetes.io/version: 5.1.3
    spec:
      securityContext:
        fsGroup: 2000
        runAsGroup: 3000
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: minecraft-server
        image: "itzg/minecraft-server:latest"
        imagePullPolicy: Always
        tty: true
        stdin: true
        resources:
          limits:
            cpu: 4
            memory: 6Gi
          requests:
            cpu: 500m
            memory: 512Mi
        readinessProbe:
          exec:
            command:
            - mc-health
          initialDelaySeconds: 30
          periodSeconds: 5
          failureThreshold: 20
          successThreshold: 1
          timeoutSeconds: 1
        livenessProbe:
          exec:
            command:
            - mc-health
          initialDelaySeconds: 30
          periodSeconds: 5
          failureThreshold: 20
          successThreshold: 1
          timeoutSeconds: 1
        env:
        - name: EULA
          value: "TRUE"
        - name: TYPE
          value: "PAPER"
        - name: VERSION
          value: "LATEST"
        - name: DIFFICULTY
          value: "easy"
        - name: SERVER_PORT
          value: "25565"
        - name: MODE
          value: "survival"
        - name: MOTD
          value: "Welcome to Minecraft on Dang Khoa Home Server!"
        - name: LEVEL_TYPE
          value: "DEFAULT"
        - name: LEVEL
          value: "world"
        - name: MODRINTH_DOWNLOAD_DEPENDENCIES
          value: "none"
        - name: MEMORY
          value: "2048M"
        - name: ENABLE_RCON
          value: "false"
        - name: CF_API_KEY
          valueFrom:
            secretKeyRef:
              name: minecraft-server-curseforge
              key: cf-api-key
        - name: CF_PARALLEL_DOWNLOADS
          value: "4"

        ports:
        - name: minecraft
          containerPort: 25565
          protocol: TCP
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: datadir
          mountPath: /data
        - name: backupdir
          mountPath: /backups
          readOnly: true
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
      volumes:
      - name: tmp
        emptyDir: {}
      - name: datadir
        persistentVolumeClaim:
          claimName: minecraft-server-datadir
      - name: backupdir
        emptyDir: {}
