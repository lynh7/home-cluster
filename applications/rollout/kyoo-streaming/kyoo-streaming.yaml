  namespace: stag01
  labels:
    helm.sh/chart: kyoo-0.0.0
    app.kubernetes.io/name: kyoo-transcoder
    app.kubernetes.io/instance: kyoo-streaming
    app.kubernetes.io/component: transcoder
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: kyoo
    app.kubernetes.io/version: "5.0.0"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: kyoo-transcoder
      app.kubernetes.io/instance: kyoo-streaming
  template:
    metadata:
      labels:
        helm.sh/chart: kyoo-0.0.0
        app.kubernetes.io/name: kyoo-transcoder
        app.kubernetes.io/instance: kyoo-streaming
        app.kubernetes.io/component: transcoder
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/part-of: kyoo
        app.kubernetes.io/version: "5.0.0"
    spec:
      serviceAccountName: kyoo-streaming-transcoder
      containers:
        - name: main
          image: ghcr.io/zoriya/kyoo_transcoder:5.0.0
          imagePullPolicy: IfNotPresent
          args:
          env:
            - name: JWKS_URL
              value: "http://kyoo-streaming-auth:4568/.well-known/jwks.json"
            - name: GOCODER_HWACCEL
              value: "disabled"
            - name: GOCODER_PRESET
              value: "fast"
            - name: GOCODER_CACHE_ROOT
              value: "/cache"
            - name: GOCODER_METADATA_ROOT
              value: "/metadata"
            # the vaapi device path (only used with GOCODER_HWACCEL=vaapi)
            - name: GOCODER_VAAPI_RENDERER
              value: "/dev/dri/renderD128"
            # the qsv device path (only used with GOCODER_HWACCEL=qsv)
            - name: GOCODER_QSV_RENDERER
              value: "/dev/dri/renderD128"
            - name: GOCODER_SAFE_PATH
              value: "/media"
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  key: username
                  name: kyoo-pg-superuser
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  key: password
                  name: kyoo-pg-superuser
            - name: PGDATABASE
              value: "kyoo_transcoder"
            - name: PGHOST
              value: "cnpg-cluster-rw"
            - name: PGPORT
              value: "5432"
            - name: PGSSLMODE
              value: "prefer"
          ports:
            - name: main
              containerPort: 7666
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /video/health
              port: main
          readinessProbe:
            httpGet:
              path: /video/ready
              port: main
          volumeMounts:
            - mountPath: /media
              name: media
              readOnly: true
            - name: transcodermetadata
              mountPath: /metadata
            - mountPath: /cache
              name: cache
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: media
        - name: transcodermetadata
          persistentVolumeClaim:
            claimName: kyoo-streaming-transcodermetadata
        - emptyDir: {}
          name: cache
