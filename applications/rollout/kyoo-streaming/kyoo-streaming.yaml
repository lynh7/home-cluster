# Source: kyoo/templates/traefikproxy/configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: kyoo-streaming-traefik
  namespace: stag01
  labels:
    helm.sh/chart: kyoo-0.0.0
    app.kubernetes.io/name: kyoo-traefik
    app.kubernetes.io/instance: kyoo-streaming
    app.kubernetes.io/component: traefik
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: kyoo
    app.kubernetes.io/version: "5.0.0"
data:
  dynamic_config.yaml: |
    http:
      routers:
        basepath:
          entryPoints:
          - web
          service: front
          rule: "PathPrefix(`/`)"
        video:
          entryPoints:
          - web
          middlewares:
          - phantomtoken
          service: transcoder
          rule: "PathPrefix(`/video`)"
        auth:
          entryPoints:
          - web
          service: auth
          rule: "PathPrefix(`/auth/`)"
        wellknown:
          entryPoints:
          - web
          service: auth
          rule: "PathPrefix(`/.well-known/`)"
        api:
          entryPoints:
          - web
          middlewares:
          - phantomtoken
          service: api
          rule: "PathPrefix(`/api/`)"
        swagger:
          entryPoints:
          - web
          service: api
          rule: "PathPrefix(`/swagger`)"
        scanner:
          entryPoints:
          - web
          middlewares:
          - phantomtoken
          service: scanner
          rule: "PathPrefix(`/scanner/`)"
      middlewares:
        phantomtoken:
          forwardAuth:
            address: "http://kyoo-streaming-auth:4568/auth/jwt"
            authRequestHeaders:
              - "Authorization"
              - "X-Api-Key"
              - "Cookie"
              - "Sec-WebSocket-Protocol"
            authResponseHeaders:
              - Authorization
      services:
        api:
          loadBalancer:
            servers:
            - url: http://kyoo-streaming-api:3567/
        front:
          loadBalancer:
            servers:
            - url: http://kyoo-streaming-front:8901/
        transcoder:
          loadBalancer:
            servers:
            - url: http://kyoo-streaming-transcoder:7666/
        auth:
          loadBalancer:
            servers:
            - url: http://kyoo-streaming-auth:4568/
        scanner:
          loadBalancer:
            servers:
            - url: http://kyoo-streaming-scanner:4389/

