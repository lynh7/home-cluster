# Source: kyoo/templates/api/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kyoo-streaming-api
  namespace: stag01
  labels:
    helm.sh/chart: kyoo-0.0.0
    app.kubernetes.io/name: kyoo-api
    app.kubernetes.io/instance: kyoo-streaming
    app.kubernetes.io/component: api
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: kyoo
    app.kubernetes.io/version: "5.0.0"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: kyoo-api
      app.kubernetes.io/instance: kyoo-streaming
  template:
    metadata:
      labels:
        helm.sh/chart: kyoo-0.0.0
        app.kubernetes.io/name: kyoo-api
        app.kubernetes.io/instance: kyoo-streaming
        app.kubernetes.io/component: api
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/part-of: kyoo
        app.kubernetes.io/version: "5.0.0"
    spec:
      serviceAccountName: kyoo-streaming-api
      initContainers:
      containers:
        - name: main
          image: ghcr.io/zoriya/kyoo_api:5.0.0
          imagePullPolicy: IfNotPresent
          args:
          env:
            - name: JWT_ISSUER
              value: "https://kyoo.mydomain.com"
            - name: AUTH_SERVER
              value: "http://kyoo-streaming-auth:4568"
            - name: TRANSCODER_SERVER
              value: "http://kyoo-streaming-transcoder:7666"
            - name: IMAGES_PATH
              value: "/images"
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  key: username
                  name: kyoo-pg-superuser
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  key: password
                  name: kyoo-pg-superuser
            - name: PGDATABASE
              value: "kyoo_api"
            - name: PGHOST
              value: "cnpg-cluster-rw"
            - name: PGPORT
              value: "5432"
            - name: PGSSLMODE
              value: "disable"
          ports:
            - name: main
              containerPort: 3567
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /api/health
              port: main
          readinessProbe:
            httpGet:
              path: /api/ready
              port: main
          volumeMounts:
            - name: apiimagedata
              mountPath: /images
      volumes:
        - name: apiimagedata
          persistentVolumeClaim:
            claimName: kyoo-streaming-apimetadata

