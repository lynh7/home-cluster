# Source: kyoo/templates/traefikproxy/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kyoo-streaming-traefik
  namespace: stag01
  labels:
    helm.sh/chart: kyoo-0.0.0
    app.kubernetes.io/name: kyoo-traefik
    app.kubernetes.io/instance: kyoo-streaming
    app.kubernetes.io/component: traefik
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: kyoo
    app.kubernetes.io/version: "5.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kyoo-traefik
      app.kubernetes.io/instance: kyoo-streaming
  template:
    metadata:
      labels:
        helm.sh/chart: kyoo-0.0.0
        app.kubernetes.io/name: kyoo-traefik
        app.kubernetes.io/instance: kyoo-streaming
        app.kubernetes.io/component: traefik
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/part-of: kyoo
        app.kubernetes.io/version: "5.0.0"
    spec:
      serviceAccountName: kyoo-streaming-traefik
      containers:
        - name: main
          image: docker.io/traefik:v3.6.13
          imagePullPolicy: IfNotPresent
          args:
            - --entryPoints.web.address=:80/tcp
            - --entryPoints.websecure.address=:443/tcp
            - --entryPoints.web.forwardedHeaders.insecure=true
            - --entryPoints.websecure.forwardedHeaders.insecure=true
            - --api.dashboard=true
            - --api.insecure=true
            - --log.level=INFO
            - --providers.file.filename=/dynamic_config/dynamic_config.yaml
          env:
          ports:
            - name: web
              containerPort: 80
              protocol: TCP
            - name: websecure
              containerPort: 443
              protocol: TCP
            - name: traefik
              containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /dynamic_config
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: kyoo-streaming-traefik
            items:
              - key: dynamic_config.yaml
                path: dynamic_config.yaml
