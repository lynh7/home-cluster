apiVersion: apps/v1
kind: Deployment
metadata:
  name: kyoo-streaming-auth
  namespace: stag01
  labels:
    helm.sh/chart: kyoo-0.0.0
    app.kubernetes.io/name: kyoo-auth
    app.kubernetes.io/instance: kyoo-streaming
    app.kubernetes.io/component: auth
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: kyoo
    app.kubernetes.io/version: "5.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kyoo-auth
      app.kubernetes.io/instance: kyoo-streaming
  template:
    metadata:
      labels:
        helm.sh/chart: kyoo-0.0.0
        app.kubernetes.io/name: kyoo-auth
        app.kubernetes.io/instance: kyoo-streaming
        app.kubernetes.io/component: auth
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/part-of: kyoo
        app.kubernetes.io/version: "5.0.0"
    spec:
      serviceAccountName: kyoo-streaming-auth
      containers:
        - name: main
          image: ghcr.io/zoriya/kyoo_auth:5.0.0
          imagePullPolicy: IfNotPresent
          args:
          env:
            - name: EXTRA_CLAIMS
              value: "{\"permissions\": [\"core.read\", \"core.play\"], \"verified\": false}"
            - name: FIRST_USER_CLAIMS
              value: "{\"permissions\": [\"users.read\", \"users.write\", \"apikeys.read\", \"apikeys.write\", \"users.delete\", \"core.read\", \"core.write\", \"core.play\", \"scanner.trigger\", \"scanner.guess\", \"scanner.search\", \"scanner.add\"], \"verified\": true}"
            - name: GUEST_CLAIMS
              value: "{\"permissions\": [\"core.read\"], \"verified\": true}"
            - name: PROTECTED_CLAIMS
              value: "permissions,verified"
            - name: PUBLIC_URL
              value: "https://kyoo.mydomain.com"
            - name: KEIBI_APIKEY_SCANNER
              valueFrom:
                secretKeyRef:
                  key: scanner_apikey
                  name: kyoo-pg-superuser
            - name: KEIBI_APIKEY_SCANNER_CLAIMS
              value: "{\"permissions\": [\"core.read\", \"core.write\"]}"
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  key: username
                  name: kyoo-pg-superuser
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  key: password
                  name: kyoo-pg-superuser
            - name: PGDATABASE
              value: "kyoo_auth"
            - name: PGHOST
              value: "cnpg-cluster-rw"
            - name: PGPORT
              value: "5432"
            - name: PGSSLMODE
              value: "prefer"
          ports:
            - name: main
              containerPort: 4568
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /auth/health
              port: main
          readinessProbe:
            httpGet:
              path: /auth/ready
              port: main
          volumeMounts:
            - name: profilepictures
              mountPath: /profile_pictures
      volumes:
        - name: profilepictures
          persistentVolumeClaim:
            claimName: kyoo-streaming-authprofile-pictures

