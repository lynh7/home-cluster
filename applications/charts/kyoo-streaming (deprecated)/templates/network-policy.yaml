{{- if .Values.securityBaseline.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-default-deny
  labels:
    app.kubernetes.io/name: {{ include "kyoo-streaming.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  podSelector: {}
  policyTypes:
    {{- if .Values.securityBaseline.networkPolicy.defaultDeny.ingress }}
    - Ingress
    {{- end }}
    {{- if .Values.securityBaseline.networkPolicy.defaultDeny.egress }}
    - Egress
    {{- end }}
{{- end }}
