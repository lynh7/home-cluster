apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: rollout-cnpg-cluster
  namespace: flux-system
spec:
  interval: 2m
  path: ./applications/rollout/cnpg-cluster
  prune: true
  targetNamespace: stag01
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  timeout: 35m
