  name: rollout-cloudnative-pg
  namespace: flux-system
spec:
  interval: 2m
  path: ./applications/rollout/cloudnative-pg
  prune: true
  targetNamespace: stag01
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  timeout: 35m
