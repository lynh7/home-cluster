apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: rollout-external-secrets
  namespace: flux-system
spec:
  interval: 5m
  path: ./infrastructure/rollout/external-secrets
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  timeout: 35m
