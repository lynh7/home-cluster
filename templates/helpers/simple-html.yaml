apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: "external-application-gateway"
spec:
  gatewayClassName: cilium
  listeners:
  - name: "https"
    protocol: HTTPS
    port: 443
    hostname: "*.tlta.online"
    allowedRoutes:
      namespaces:
        from: Same
    tls:
      mode: Terminate
      certificateRefs:
      - name: "monitoring-internal-tls"
        namespace: "cert-manager"
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: "allow-gateway-cert-via-ns-cert-manager"
  namespace: "cert-manager"
spec:
  from:
  - group: gateway.networking.k8s.io
    kind: Gateway
    namespace: "default"
  to:
  - group: ""
    kind: Secret
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-service
  labels:
    app: nginx
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
  selector:
    app: nginx
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: "external-application-gateway-route"
spec:
  parentRefs:
  - name: "external-application-gateway"
  rules:
  - backendRefs:
    - name: nginx-service
      port: 80
---
apiVersion: v1
kind: Pod
metadata:
  name: nginx-pod
  labels:
    app: nginx
spec:
  containers:
  - name: nginx-container
    image: nginx:latest
    ports:
    - containerPort: 80
    volumeMounts:
    - name: html-volume
      mountPath: /usr/share/nginx/html/index.html
      subPath: index.html
  volumes:
  - name: html-volume
    configMap:
      name: nginx-html-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-html-config
data:
  index.html: |
    <html>
    <body>
      <h1>Hello from an Nginx Pod!</h1>
    </body>
    </html>
