apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-secrets-operator-vaultwarden-eso
  namespace: vaultwarden
  labels:
    helm.sh/chart: vaultwarden-eso-1.2.0
    app.kubernetes.io/name: vaultwarden-eso
    app.kubernetes.io/instance: external-secrets-operator
    app.kubernetes.io/version: "1.5.0"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vaultwarden-eso
      app.kubernetes.io/instance: external-secrets-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vaultwarden-eso
        app.kubernetes.io/instance: external-secrets-operator
    spec:
      serviceAccountName: external-secrets-operator-vaultwarden-eso
      securityContext:
        {}
      containers:
        - name: vaultwarden-eso
          securityContext:
            {}
          image: "jessebot/bweso:1.5.0"
          imagePullPolicy: IfNotPresent
          env:
            - name: BW_HOST
              valueFrom:
                secretKeyRef:
                  name: "vaultwarden-kubernetes-secrets"
                  key: https://vw.tlta.online
            - name: BW_CLIENTID
              valueFrom:
                secretKeyRef:
                  name: "vaultwarden-kubernetes-secrets"
                  key: BW_CLIENTID
            - name: BW_CLIENTSECRET
              valueFrom:
                secretKeyRef:
                  name: "vaultwarden-kubernetes-secrets"
                  key: BW_CLIENTSECRET
            - name: BW_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: "vaultwarden-kubernetes-secrets"
                  key: VAULTWARDEN__MASTERPASSWORD
            - name: BW_APPID
              valueFrom:
                secretKeyRef:
                  name: "vaultwarden-kubernetes-secrets"
                  key: XqbwzDfd5D95IEz7ZVVxy4Qj3O0Is7
          ports:
            - name: http
              containerPort: 8087
              protocol: TCP
          livenessProbe:
            exec:
              command:
                - wget
                - -q
                - http://127.0.0.1:8087/sync
                - --post-data=''
            initialDelaySeconds: 20
            failureThreshold: 30
            timeoutSeconds: 1
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 8087
            initialDelaySeconds: 20
            failureThreshold: 30
            timeoutSeconds: 1
            periodSeconds: 10
          startupProbe:
            tcpSocket:
              port: 8087
            initialDelaySeconds: 20
            failureThreshold: 30
            timeoutSeconds: 1
            periodSeconds: 10
          resources:
            {}
