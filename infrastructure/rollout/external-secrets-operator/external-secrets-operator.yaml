kind: ClusterSecretStore
metadata:
  name: bitwarden-login
spec:
  provider:
    webhook:
      url: "http://external-secrets-operator.vaultwarden.svc.cluster.local.:8087/list/object/items?search={{ .remoteRef.key }}"
