replicaCount: 1

# -- Specifies the amount of historic ReplicaSets k8s should keep (see https://kubernetes.io/docs/concepts/workloads/controllers/deployment/#clean-up-policy)
revisionHistoryLimit: 5

installCRDs: true

# -- Specifies whether an external secret operator deployment be created.
createOperator: true

serviceMonitor:
  enabled: true
  renderMode: alwaysRender

# ── ClusterSecretStore ────────────────────────────────────────────
clusterSecretStore:
  enabled: true
  name: infisical

  auth:
    secretName: infisical-auth
    clientIdKey: clientId
    clientSecretKey: clientSecret
    namespace: stag01

  infisical:
    projectSlug: "home-server-83-az"
    environmentSlug: "staging"
    secretsPath: "/"
    hostAPI: "http://192.168.10.99/"

# ── ExternalSecrets ───────────────────────────────────────────────
# Each entry produces one ExternalSecret resource.
# Toggle enabled: false to skip without removing the block.
externalSecrets:

  - name: kyoo-pg-credentials
    enabled: true
    namespace: stag01
    targetSecret: kyoo-pg-credentials
    refreshInterval: "1h"
    data:
      - secretKey: username
        remoteKey: CNPG_USER
      - secretKey: password
        remoteKey: CNPG_PASSWORD

  - name: kyoo-pg-superuser
    enabled: true
    namespace: stag01
    targetSecret: kyoo-pg-superuser
    refreshInterval: "1h"
    template:
      type: kubernetes.io/basic-auth
    data:
      - secretKey: username
        remoteKey: POSTGRES_SUPERUSER_USER
      - secretKey: password
        remoteKey: POSTGRES_SUPERUSER_PASSWORD
      - secretKey: scanner_apikey
        remoteKey: KEIBI_APIKEY_SCANNER