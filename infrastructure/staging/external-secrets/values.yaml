replicaCount: 1

# -- Specifies the amount of historic ReplicaSets k8s should keep (see https://kubernetes.io/docs/concepts/workloads/controllers/deployment/#clean-up-policy)
revisionHistoryLimit: 5

installCRDs: true

# -- Specifies whether an external secret operator deployment be created.
createOperator: true

extraArgs:
  unsafe-allow-generic-targets: "true"

serviceMonitor:
  enabled: true
  renderMode: alwaysRender

# ── ClusterSecretStore ────────────────────────────────────────────
clusterSecretStore:
  enabled: true
  name: infisical

  auth:
    secretName: infisical-auth
    clientIdKey: clientId
    clientSecretKey: clientSecret
    namespace: stag01

  infisical:
    projectSlug: "home-server-83-az"
    environmentSlug: "staging"
    secretsPath: "/"
    hostAPI: "http://192.168.10.99/"
    # Phase 1 target:
    # hostAPI: "https://infisical.home.arpa/api"
    # caProvider:
    #   name: infisical-ca
    #   key: ca.crt
    #   type: ConfigMap
    #   namespace: monitoring

# ── ExternalSecrets ───────────────────────────────────────────────
# Each entry produces one ExternalSecret resource.
# Toggle enabled: false to skip without removing the block.
externalSecrets:

  # - name: kyoo-pg-credentials
  #   enabled: true
  #   namespace: stag01
  #   targetSecret: kyoo-pg-credentials
  #   refreshInterval: "1h"
  #   data:
  #     - secretKey: username
  #       remoteKey: CNPG_USER
  #     - secretKey: password
  #       remoteKey: CNPG_PASSWORD

  - name: job-aggregator-pg-credentials
    enabled: true
    namespace: stag01
    targetSecret: job-aggregator-pg-credentials
    refreshInterval: "1h"
    template:
      type: kubernetes.io/basic-auth
      engineVersion: v2
      data:
        username: |
          job_aggregator
        password: |
          {{ .password }}
    data:
      - secretKey: password
        remoteKey: CNPG_PASSWORD

  - name: job-aggregator-db-connection
    enabled: true
    namespace: stag01
    targetSecret: job-aggregator-db-connection
    refreshInterval: "1h"
    template:
      engineVersion: v2
      data:
        uri: |
          postgresql://job_aggregator:{{ .password }}@cnpg-cluster-rw.stag01.svc:5432/job_aggregator
        DATABASE_URL: |
          postgresql://job_aggregator:{{ .password }}@cnpg-cluster-rw.stag01.svc:5432/job_aggregator
        DB_URL: |
          postgresql://job_aggregator:{{ .password }}@cnpg-cluster-rw.stag01.svc:5432/job_aggregator
    data:
      - secretKey: password
        remoteKey: CNPG_PASSWORD

  - name: job-aggregator-pg-superuser
    enabled: true
    namespace: stag01
    targetSecret: job-aggregator-pg-superuser
    refreshInterval: "1h"
    template:
      type: kubernetes.io/basic-auth
      engineVersion: v2
      data:
        username: |
          postgres
        password: |
          {{ .password }}
    data:
      - secretKey: password
        remoteKey: POSTGRES_SUPERUSER_PASSWORD

  - name: discord-webhook
    enabled: true
    namespace: monitoring
    targetSecret: discord-webhook
    refreshInterval: "1h"
    data:
      - secretKey: WEBHOOK_URL
        remoteKey: DISCORD_WEB_HOOK

  - name: alertmanager-config
    enabled: true
    namespace: monitoring
    targetSecret: alertmanager-config
    refreshInterval: "1h"
    targetManifest:                    # only set this if --unsafe-allow-generic-targets is enabled
      apiVersion: v1
      kind: ConfigMap
    template:
      engineVersion: v2
      data:
        alertmanager.yaml: |
          global:
            resolve_timeout: 5m
          route:
            receiver: discord
            group_by: [alertname, severity, namespace]
            group_wait: 30s
            group_interval: 5m
            repeat_interval: 12h
          receivers:
            - name: discord
              discord_configs:
                - webhook_url: "{{ .WEBHOOK_URL }}"
                  send_resolved: true
    data:
      - secretKey: WEBHOOK_URL
        remoteKey: DISCORD_WEB_HOOK

  - name: ghcr-creds
    enabled: true
    namespace: stag01
    targetSecret: ghcr-creds
    refreshInterval: "1h"
    template:
      type: kubernetes.io/basic-auth
    data:
      - secretKey: DOCKER_USERNAME
        remoteKey: GHCR_USERNAME
      - secretKey: DOCKER_PASSWORD
        remoteKey: GHCR_PAT
      - secretKey: DOCKER_SERVER
        remoteKey: GHCR_SERVER