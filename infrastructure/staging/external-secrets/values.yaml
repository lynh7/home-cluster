replicaCount: 1

# -- Specifies the amount of historic ReplicaSets k8s should keep (see https://kubernetes.io/docs/concepts/workloads/controllers/deployment/#clean-up-policy)
revisionHistoryLimit: 5

installCRDs: true

# -- Specifies whether an external secret operator deployment be created.
createOperator: true

extraArgs:
  unsafe-allow-generic-targets: "true"

serviceMonitor:
  enabled: true
  renderMode: alwaysRender

# ── ClusterSecretStore ────────────────────────────────────────────
clusterSecretStore:
  enabled: true
  name: infisical

  auth:
    secretName: infisical-auth
    clientIdKey: clientId
    clientSecretKey: clientSecret
    namespace: stag01

  infisical:
    projectSlug: "home-server-83-az"
    environmentSlug: "staging"
    secretsPath: "/"
    hostAPI: "http://192.168.10.99/"

# ── ExternalSecrets ───────────────────────────────────────────────
# Each entry produces one ExternalSecret resource.
# Toggle enabled: false to skip without removing the block.
externalSecrets:

  - name: kyoo-pg-credentials
    enabled: true
    namespace: stag01
    targetSecret: kyoo-pg-credentials
    refreshInterval: "1h"
    data:
      - secretKey: username
        remoteKey: CNPG_USER
      - secretKey: password
        remoteKey: CNPG_PASSWORD

  - name: kyoo-pg-superuser
    enabled: true
    namespace: stag01
    targetSecret: kyoo-pg-superuser
    refreshInterval: "1h"
    template:
      type: kubernetes.io/basic-auth
    data:
      - secretKey: username
        remoteKey: POSTGRES_SUPERUSER_USER
      - secretKey: password
        remoteKey: POSTGRES_SUPERUSER_PASSWORD
      - secretKey: scanner_apikey
        remoteKey: KEIBI_APIKEY_SCANNER

  - name: discord-webhook
    enabled: true
    namespace: monitoring
    targetSecret: discord-webhook
    refreshInterval: "1h"
    data:
      - secretKey: WEBHOOK_URL
        remoteKey: DISCORD_WEB_HOOK

  - name: alertmanager-config
    enabled: true
    namespace: monitoring
    targetSecret: alertmanager-config
    refreshInterval: "1h"
    targetManifest:                    # only set this if --unsafe-allow-generic-targets is enabled
      apiVersion: v1
      kind: ConfigMap
    template:
      engineVersion: v2
      data:
        alertmanager.yaml: |
          global:
            resolve_timeout: 5m
          route:
            receiver: discord
            group_by: [alertname, severity, namespace]
            group_wait: 30s
            group_interval: 5m
            repeat_interval: 12h
          receivers:
            - name: discord
              discord_configs:
                - webhook_url: "{{ .WEBHOOK_URL }}"
                  send_resolved: true
    data:
      - secretKey: WEBHOOK_URL
        remoteKey: DISCORD_WEB_HOOK