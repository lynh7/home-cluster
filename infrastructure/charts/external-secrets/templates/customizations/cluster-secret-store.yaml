{{- if .Values.clusterSecretStore.enabled }}
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: {{ .Values.clusterSecretStore.name }}
spec:
  provider:
    infisical:
      auth:
        universalAuthCredentials:
          clientId:
            name: {{ .Values.clusterSecretStore.auth.secretName }}
            key: {{ .Values.clusterSecretStore.auth.clientIdKey }}
            namespace: {{ .Values.clusterSecretStore.auth.namespace }}
          clientSecret:
            name: {{ .Values.clusterSecretStore.auth.secretName }}
            key: {{ .Values.clusterSecretStore.auth.clientSecretKey }}
            namespace: {{ .Values.clusterSecretStore.auth.namespace }}
      secretsScope:
        projectSlug: {{ .Values.clusterSecretStore.infisical.projectSlug | quote }}
        environmentSlug: {{ .Values.clusterSecretStore.infisical.environmentSlug | quote }}
        {{- if .Values.clusterSecretStore.infisical.secretsPath }}
        secretsPath: {{ .Values.clusterSecretStore.infisical.secretsPath | quote }}
        {{- end }}
        {{- if .Values.clusterSecretStore.infisical.hostAPI }}
      hostAPI: {{ .Values.clusterSecretStore.infisical.hostAPI | quote }}
        {{- end }}
{{- end }}