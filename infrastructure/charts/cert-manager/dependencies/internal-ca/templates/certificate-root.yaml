apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.rootCA.certName }}
  namespace: {{ .Values.rootCA.namespace }}
spec:
  isCA: true
  commonName: {{ .Values.rootCA.commonName }}
  secretName: {{ .Values.rootCA.secretName }}
  duration: {{ .Values.rootCA.duration }}
  renewBefore: {{ .Values.rootCA.renewBefore }}
  privateKey:
    algorithm: {{ .Values.rootCA.privateKey.algorithm }}
    size: {{ .Values.rootCA.privateKey.size }}
  issuerRef:
    name: {{ .Values.rootCA.selfSignedIssuerName }}
    kind: ClusterIssuer
    group: cert-manager.io