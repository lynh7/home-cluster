groups:
  - name: cluster-critical-health
    rules:
      - alert: KubernetesNodeNotReady
        expr: kube_node_status_condition{condition="Ready",status="true"} == 0
        for: 10m
        labels:
          severity: critical
          category: kubernetes
          scope: node
        annotations:
          summary: "Node {{ $labels.node }} is not Ready"
          description: "Kubernetes node {{ $labels.node }} has reported NotReady for more than 10 minutes."
          impact: "Pods may not schedule or may be evicted. Cluster redundancy is reduced."
          investigate: "Check node status, recent events, kubelet health, Cilium state, and host resource pressure."
          dashboard_url: "https://grafana.cluster.home.tlta.online/explore"
          runbook_url: "https://kubernetes.io/docs/tasks/debug/debug-cluster/"

      - alert: KubernetesDeploymentReplicasMismatch
        expr: kube_deployment_spec_replicas{namespace!~"kube-system|monitoring"} > kube_deployment_status_replicas_available{namespace!~"kube-system|monitoring"}
        for: 15m
        labels:
          severity: critical
          category: kubernetes
          scope: workload
        annotations:
          summary: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} is below desired replicas"
          description: "Available replicas for deployment {{ $labels.namespace }}/{{ $labels.deployment }} are below spec for more than 15 minutes."
          impact: "User-facing capacity or availability may be degraded."
          investigate: "Check rollout status, pod scheduling, image pulls, recent events, and dependent services."
          dashboard_url: "https://grafana.cluster.home.tlta.online/explore"
          runbook_url: "https://kubernetes.io/docs/concepts/workloads/controllers/deployment/"

      - alert: KubernetesStatefulSetReplicasMismatch
        expr: kube_statefulset_replicas{namespace!~"kube-system|monitoring"} > kube_statefulset_status_replicas_ready{namespace!~"kube-system|monitoring"}
        for: 15m
        labels:
          severity: critical
          category: kubernetes
          scope: workload
        annotations:
          summary: "StatefulSet {{ $labels.namespace }}/{{ $labels.statefulset }} is below desired replicas"
          description: "Ready replicas for statefulset {{ $labels.namespace }}/{{ $labels.statefulset }} are below spec for more than 15 minutes."
          impact: "Stateful app durability or service availability may be reduced."
          investigate: "Check PVC binding, pod startup, storage backend health, and recent events."
          dashboard_url: "https://grafana.cluster.home.tlta.online/explore"
          runbook_url: "https://kubernetes.io/docs/concepts/workloads/controllers/statefulset/"

      - alert: KubernetesPersistentVolumeClaimPending
        expr: kube_persistentvolumeclaim_status_phase{phase="Pending"} == 1
        for: 15m
        labels:
          severity: critical
          category: storage
          scope: pvc
        annotations:
          summary: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} is Pending"
          description: "PersistentVolumeClaim {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} has remained Pending for more than 15 minutes."
          impact: "Stateful workloads may fail to start or recover."
          investigate: "Check storage class, Longhorn health, capacity, and PVC events."
          dashboard_url: "https://grafana.cluster.home.tlta.online/explore"
          runbook_url: "https://kubernetes.io/docs/concepts/storage/persistent-volumes/"

      - alert: KubernetesJobFailures
        expr: kube_job_status_failed > 0
        for: 15m
        labels:
          severity: warning
          category: kubernetes
          scope: job
        annotations:
          summary: "Job {{ $labels.namespace }}/{{ $labels.job_name }} has failed"
          description: "Job {{ $labels.namespace }}/{{ $labels.job_name }} reports one or more failed pods."
          impact: "Scheduled automation such as backup, sync, or maintenance may not have completed."
          investigate: "Check the Job, related pods, and their logs."
          dashboard_url: "https://grafana.cluster.home.tlta.online/explore"
          runbook_url: "https://kubernetes.io/docs/concepts/workloads/controllers/job/"

  - name: cluster-critical-runtime
    rules:
      - alert: KubernetesContainerCrashLooping
        expr: max by (cluster, namespace, pod, container) (kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff"}) > 0
        for: 10m
        labels:
          severity: critical
          category: kubernetes
          scope: pod
        annotations:
          summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash looping"
          description: "Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }} has been in CrashLoopBackOff for more than 10 minutes."
          impact: "Application availability is degraded or unavailable."
          investigate: "Inspect pod logs, restart history, events, and recent config or secret changes."
          dashboard_url: "https://grafana.cluster.home.tlta.online/explore"
          runbook_url: "https://kubernetes.io/docs/tasks/debug/debug-application/debug-pods/"

      - alert: KubernetesPodHighRestarts
        expr: increase(kube_pod_container_status_restarts_total[30m]) > 5
        for: 10m
        labels:
          severity: warning
          category: kubernetes
          scope: pod
        annotations:
          summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is restarting frequently"
          description: "Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }} restarted more than 5 times in 30 minutes."
          impact: "Application may be unstable even if it still appears up."
          investigate: "Check pod logs, readiness/liveness probes, resource pressure, and dependency failures."
          dashboard_url: "https://grafana.cluster.home.tlta.online/explore"
          runbook_url: "https://kubernetes.io/docs/tasks/debug/debug-application/debug-pods/"

      - alert: NodeFilesystemAlmostFull
        expr: (node_filesystem_avail_bytes{mountpoint="/",fstype!~"tmpfs|fuse.lxcfs|overlay"} / node_filesystem_size_bytes{mountpoint="/",fstype!~"tmpfs|fuse.lxcfs|overlay"}) < 0.10
        for: 15m
        labels:
          severity: critical
          category: node
          scope: node
        annotations:
          summary: "Root filesystem on node {{ $labels.instance }} is almost full"
          description: "Available space on {{ $labels.instance }} root filesystem is below 10% for more than 15 minutes."
          impact: "Pods, logs, and node services may fail unexpectedly."
          investigate: "Check disk usage, container logs, image cache, and Longhorn or application storage growth."
          dashboard_url: "https://grafana.cluster.home.tlta.online/explore"
          runbook_url: "https://kubernetes.io/docs/concepts/cluster-administration/logging/"

  - name: cluster-critical-platform
    rules:
      - alert: CiliumDaemonSetUnavailable
        expr: kube_daemonset_status_number_unavailable{namespace="kube-system",daemonset="cilium"} > 0
        for: 10m
        labels:
          severity: critical
          category: networking
          scope: platform
        annotations:
          summary: "Cilium has unavailable daemonset pods"
          description: "The Cilium daemonset has one or more unavailable pods for more than 10 minutes."
          impact: "Cluster networking, service routing, and policy enforcement may be degraded."
          investigate: "Check Cilium pod health, node conditions, recent upgrades, and Hubble/Cilium metrics."
          dashboard_url: "https://grafana.cluster.home.tlta.online/explore"
          runbook_url: "https://docs.cilium.io/en/stable/operations/troubleshooting/"

      - alert: HubbleRelayUnavailable
        expr: kube_deployment_status_replicas_available{namespace="kube-system",deployment="hubble-relay"} < 1
        for: 10m
        labels:
          severity: warning
          category: networking
          scope: platform
        annotations:
          summary: "Hubble Relay is unavailable"
          description: "The Hubble Relay deployment in kube-system has no available replicas for more than 10 minutes."
          impact: "Network flow visibility and troubleshooting are degraded."
          investigate: "Check hubble-relay pods, service, and cilium-agent connectivity."
          dashboard_url: "https://grafana.cluster.home.tlta.online/explore"
          runbook_url: "https://docs.cilium.io/en/stable/observability/hubble/setup/"

      - alert: ExternalMonitoringTargetDown
        expr: up{job=~"rasp4-node|minidesk-host|maindesk-host|openwrt-router|haproxy-router"} == 0
        for: 10m
        labels:
          severity: warning
          category: external-dependency
          scope: monitoring
        annotations:
          summary: "External monitoring target {{ $labels.job }} is down"
          description: "Alloy cannot scrape external target {{ $labels.job }} at {{ $labels.instance }} for more than 10 minutes."
          impact: "Visibility into LAN infrastructure is incomplete."
          investigate: "Check host reachability, exporter health, LAN routing, and firewall rules."
          dashboard_url: "https://grafana.cluster.home.tlta.online/explore"
          runbook_url: "https://prometheus.io/docs/prometheus/latest/querying/basics/"
