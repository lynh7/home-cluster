{{- range .Values.httpRoutes }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .name | quote }}
  namespace: {{ .namespace | default "default" | quote }}
spec:
  parentRefs:
  - name: {{ .gateway | default "default-gateway" | quote }}
    kind: Gateway
    namespace: {{ .gatewayNamespace | default "default" | quote }}
  hostnames:
  - {{ .hostname | quote }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: "/"
    backendRefs:
    - name: {{ .service | quote }}
      port: {{ .port }}
      namespace: {{ .namespace | default "default" | quote }}
{{- end }}