name: Render Helm Manifests App

permissions:
  contents: write

on:
  push:
    branches:
      - main
    paths:
      - 'applications/staging/**'
      - 'applications/charts/**'
    paths-ignore:
      - 'applications/staging/plane-prod/**'

  workflow_dispatch:
    inputs:
      chart:
        description: "Chart name (optional)"
        required: false

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Install yq
        run: |
          sudo wget https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64 -O /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq

      - name: Detect changed charts (auto/manual)
        id: changed
        run: |
          echo "Event: ${{ github.event_name }}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${{ github.event.inputs.chart }}" ]; then
              CHARTS="${{ github.event.inputs.chart }}"
            else
              CHARTS=$(ls applications/staging | tr '\n' ' ')
            fi
          else
            CHARTS=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} \
              | grep '^applications/staging/' \
              | cut -d/ -f3 \
              | sort -u \
              | tr '\n' ' ')
          fi

          echo "Charts: $CHARTS"
          echo "charts=$CHARTS" >> "$GITHUB_OUTPUT"

      - name: Fetch latest main
        run: |
          git fetch origin main
          git pull origin main

      - name: Render Charts
        run: |
          set -euo pipefail

          mkdir -p .render-cache/charts

          for chart in ${{ steps.changed.outputs.charts }}; do
            [ -n "$chart" ] || continue
            echo "Rendering $chart"

            NAMESPACE="default"
            if [ -f "applications/charts/$chart/meta.yaml" ]; then
              NAMESPACE=$(yq -r '.namespace' "applications/charts/$chart/meta.yaml")
            fi

            CHART_PATH="applications/charts/$chart"
            SOURCE_FILE="applications/staging/$chart/chart-source.yaml"

            if [ -f "$SOURCE_FILE" ]; then
              REPO_URL=$(yq -r '.repo' "$SOURCE_FILE")
              CHART_NAME=$(yq -r '.name' "$SOURCE_FILE")
              CHART_VERSION=$(yq -r '.version' "$SOURCE_FILE")
              SOURCE_NAMESPACE=$(yq -r '.namespace // ""' "$SOURCE_FILE")

              if [ -n "$SOURCE_NAMESPACE" ] && [ "$SOURCE_NAMESPACE" != "null" ]; then
                NAMESPACE="$SOURCE_NAMESPACE"
              fi

              REPO_ALIAS=$(echo "$chart" | tr '[:upper:]' '[:lower:]' | tr -cs 'a-z0-9' '-')
              CHART_DIR=".render-cache/charts/$chart"

              rm -rf "$CHART_DIR"
              helm repo add "$REPO_ALIAS" "$REPO_URL" --force-update
              helm repo update "$REPO_ALIAS"
              helm pull "$REPO_ALIAS/$CHART_NAME" --version "$CHART_VERSION" --untar --untardir "$CHART_DIR"
              CHART_PATH="$CHART_DIR/$CHART_NAME"
            else
              helm dependency build "$CHART_PATH"
            fi

            helm lint "$CHART_PATH" --values "applications/staging/$chart/values.yaml"

            mkdir -p "applications/rollout/$chart"
            helm template "$chart" "$CHART_PATH" \
              --values "applications/staging/$chart/values.yaml" \
              --namespace "$NAMESPACE" \
              > "applications/rollout/$chart/$chart.yaml"

            kubectl apply --dry-run=client -f "applications/rollout/$chart/$chart.yaml" >/dev/null
          done

      - name: Render diff summary
        run: |
          git diff --stat -- applications/rollout

      - name: Commit rendered manifests
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add applications/rollout
          git commit -m "Auto-render updated Helm manifests" || echo "No changes"
          git push
